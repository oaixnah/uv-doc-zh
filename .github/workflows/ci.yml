name: Build Documentation
on:
  push:
    tags:
      - '*.*'
      - '*.*.*'
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material requests google-auth
      - run: mkdocs gh-deploy --force
        env:
          UV_ANALYTICS_PROVIDER: ${{ secrets.ANALYTICS_PROVIDER }}
          UV_GOOGLE_ANALYTICS_KEY: ${{ secrets.GOOGLE_ANALYTICS_KEY }}
          UV_CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
          PROD: true
      - name: Push URLs to Search Engines
        run: python push_urls_to_search_engines.py
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          BING_NOW_API_KEY: ${{ secrets.BING_NOW_API_KEY }}
